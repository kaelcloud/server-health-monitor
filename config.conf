# ========================================
# Server Health Monitor - Configuration
# ========================================

# Thresholds (dalam percent)
CPU_THRESHOLD=80
MEMORY_THRESHOLD=85
DISK_THRESHOLD=90

# Services nak dicek
SERVICES="nginx ssh cron"

# Log files nak dicek
LOG_FILE="/var/log/syslog"

# Output log untuk monitor ni sendiri
MONITOR_LOG="$HOME/server-health-monitor/monitor.log"
